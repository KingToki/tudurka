<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ТуДУрка</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e15;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: rgba(255,255,255,0.07);
      --accent: #f5a623;
      --green: #4ade80;
      --red: #ff6b6b;
      --text: #f0ece4;
      --muted: rgba(255,255,255,0.35);
      --r: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; padding-bottom: 84px; }

    .header { padding: 16px 20px 0; display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, #f5a623, #e8722a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 20px rgba(245,166,35,0.3); flex-shrink: 0; }
    .logo-text { font-family: 'Caveat', cursive; font-size: 28px; font-weight: 700; line-height: 1; }
    .logo-text span { color: var(--accent); }
    .date-badge { margin-left: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; }

    .stats { display: flex; gap: 8px; padding: 12px 20px 0; }
    .stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
    .stat-n { font-family: 'Caveat', cursive; font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-n.o { color: var(--accent); }
    .stat-n.g { color: var(--green); }
    .stat-n.b { color: #60a5fa; }
    .stat-l { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .progress { padding: 10px 20px 0; }
    .p-track { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .p-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

    .section-title { padding: 14px 20px 8px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .task-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }

    .task-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; transition: all 0.2s; animation: taskIn 0.3s ease; position: relative; }
    @keyframes taskIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .task-item.done { opacity: 0.45; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
    .task-item.prio-high { border-left: 3px solid var(--red); }
    .task-item.prio-medium { border-left: 3px solid var(--accent); }
    .task-item.prio-low { border-left: 3px solid var(--green); }

    .check { width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; font-size: 11px; color: transparent; font-weight: 700; }
    .task-item.done .check { background: var(--green); border-color: var(--green); color: #0e0e15; }

    .task-body { flex: 1; min-width: 0; }
    .task-text { font-size: 15px; font-weight: 500; line-height: 1.4; transition: all 0.2s; }
    .task-meta { display: flex; gap: 6px; align-items: center; margin-top: 5px; }
    .badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
    .badge-ai { background: rgba(245,166,35,0.15); color: var(--accent); }
    .badge-m { background: rgba(255,255,255,0.06); color: var(--muted); }
    .task-time { font-size: 10px; color: var(--muted); }

    .task-del { width: 26px; height: 26px; background: rgba(255,107,107,0.1); border: none; border-radius: 50%; color: var(--red); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
    .task-item:active .task-del { opacity: 1; }

    .empty { text-align: center; padding: 36px 20px; color: var(--muted); }
    .empty .icon { font-size: 42px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }
    .empty strong { color: var(--accent); font-weight: 700; }

    .ai-status { margin: 10px 20px 0; background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.2); border-radius: var(--r); padding: 10px 14px; font-size: 12px; color: var(--accent); display: none; align-items: center; gap: 8px; font-weight: 600; }
    .ai-status.on { display: flex; }
    .dots span { display: inline-block; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: db 0.9s ease-in-out infinite; margin-right: 2px; }
    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes db { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }

    .bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 10px 20px 24px; background: linear-gradient(to top, var(--bg) 60%, transparent); }
    .input-row { display: flex; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 7px 7px 7px 16px; transition: border-color 0.2s; }
    .input-row:focus-within { border-color: rgba(245,166,35,0.4); }
    .input-row input { flex: 1; background: none; border: none; outline: none; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); }
    .input-row input::placeholder { color: var(--muted); }
    .add-btn { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), #e8722a); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; flex-shrink: 0; transition: transform 0.15s; box-shadow: 0 4px 12px rgba(245,166,35,0.35); color: white; font-weight: 700; }
    .add-btn:active { transform: scale(0.9); }
    .add-btn:disabled { opacity: 0.4; transform: none; }

    .cloud-line { text-align: center; font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; font-weight: 600; }
    .c-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
    .c-dot.syncing { background: var(--accent); animation: blink 0.7s ease infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    .new-banner { margin: 8px 20px 0; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); border-radius: var(--r); padding: 10px 14px; font-size: 12px; color: var(--green); display: none; align-items: center; gap: 8px; font-weight: 600; animation: taskIn 0.3s ease; }
    .new-banner.on { display: flex; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-icon">🎙️</div>
    <div class="logo-text">ТуДУ<span>рка</span></div>
    <div class="date-badge" id="dateBadge"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n o" id="sTotal">0</div><div class="stat-l">всего</div></div>
    <div class="stat"><div class="stat-n g" id="sDone">0</div><div class="stat-l">готово</div></div>
    <div class="stat"><div class="stat-n b" id="sLeft">0</div><div class="stat-l">осталось</div></div>
  </div>

  <div class="progress"><div class="p-track"><div class="p-fill" id="pFill" style="width:0%"></div></div></div>

  <div class="ai-status" id="aiStatus"><div class="dots"><span></span><span></span><span></span></div> ИИ разбирает задачи...</div>
  <div class="new-banner" id="newBanner">✓ <span id="newText">Задачи добавлены!</span></div>

  <div class="section-title">Мои дела</div>
  <div class="task-list" id="taskList"></div>
</div>

<div class="bottom">
  <div class="input-row">
    <input id="inp" type="text" placeholder="Добавить задачу..." maxlength="200">
    <button class="add-btn" id="addBtn" onclick="addManual()">+</button>
  </div>
  <div class="cloud-line"><div class="c-dot" id="cDot"></div><span id="cTxt">Сохранено в Telegram Cloud</span></div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0e0e15'); tg.setBackgroundColor('#0e0e15'); }

  // ============================================================
  // Telegram CloudStorage — сохраняет данные в облаке Telegram
  // Работает у КАЖДОГО пользователя отдельно, синхронизируется
  // между всеми устройствами пользователя автоматически
  // ============================================================
  const Cloud = {
    save(tasks) {
      const data = JSON.stringify(tasks);
      if (tg?.CloudStorage) {
        setSyncing(true);
        tg.CloudStorage.setItem('tudurka_tasks', data, () => setSyncing(false));
      } else {
        // Fallback для браузера/демо
        try { localStorage.setItem('tudurka_tasks', data); } catch(e){}
        setSyncing(false);
      }
    },
    load(cb) {
      if (tg?.CloudStorage) {
        tg.CloudStorage.getItem('tudurka_tasks', (err, val) => {
          if (!err && val) {
            try { cb(JSON.parse(val)); } catch(e) { cb([]); }
          } else { cb([]); }
        });
      } else {
        try {
          const val = localStorage.getItem('tudurka_tasks');
          cb(val ? JSON.parse(val) : []);
        } catch(e) { cb([]); }
      }
    }
  };

  function setSyncing(on) {
    const dot = document.getElementById('cDot');
    const txt = document.getElementById('cTxt');
    dot.className = 'c-dot' + (on ? ' syncing' : '');
    txt.textContent = on ? 'Сохраняю...' : 'Сохранено в Telegram Cloud';
  }

  let tasks = [];

  const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const nd = new Date();
  document.getElementById('dateBadge').textContent = `${days[nd.getDay()]}, ${nd.getDate()} ${months[nd.getMonth()]}`;

  function getTime() {
    const t = new Date();
    return `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
  }

  function renderTasks() {
    const list = document.getElementById('taskList');
    const total = tasks.length, done = tasks.filter(t => t.done).length, left = total - done;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('sTotal').textContent = total;
    document.getElementById('sDone').textContent = done;
    document.getElementById('sLeft').textContent = left;
    document.getElementById('pFill').style.width = pct + '%';

    if (!tasks.length) {
      list.innerHTML = `<div class="empty"><div class="icon">🎙️</div><p>Задач нет.<br>Отправь <strong>голосовое боту</strong><br>или напиши задачу внизу.</p></div>`;
      return;
    }
    list.innerHTML = tasks.map((t,i) => `
      <div class="task-item ${t.done?'done':''} prio-${t.priority}" onclick="toggle(${i})">
        <div class="check">${t.done?'✓':''}</div>
        <div class="task-body">
          <div class="task-text">${esc(t.text)}</div>
          <div class="task-meta">
            <span class="badge ${t.source==='ai'?'badge-ai':'badge-m'}">${t.source==='ai'?'🤖 ИИ':'✍ вручную'}</span>
            <span class="task-time">${t.time}</span>
          </div>
        </div>
        <button class="task-del" onclick="del(event,${i})">×</button>
      </div>`).join('');
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function toggle(i) { tasks[i].done = !tasks[i].done; Cloud.save(tasks); renderTasks(); if (tg) tg.HapticFeedback?.impactOccurred('light'); }
  function del(e, i) { e.stopPropagation(); tasks.splice(i,1); Cloud.save(tasks); renderTasks(); if (tg) tg.HapticFeedback?.impactOccurred('medium'); }

  function addManual() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, done: false, source: 'manual', priority: 'medium', time: getTime() });
    inp.value = '';
    Cloud.save(tasks);
    renderTasks();
    if (tg) tg.HapticFeedback?.impactOccurred('light');
  }

  // Задачи из бота — приходят через URL параметр или postMessage
  function addTasksFromBot(newTasks) {
    if (!newTasks?.length) return;
    const t = getTime();
    newTasks.forEach(nt => {
      if (nt.text?.trim()) {
        tasks.unshift({ id: Date.now()+Math.random(), text: nt.text.trim(), done: false, source: 'ai', priority: nt.priority||'medium', time: t });
      }
    });
    Cloud.save(tasks);
    renderTasks();
    const n = newTasks.length;
    const w = n===1?'задача':n<5?'задачи':'задач';
    document.getElementById('newText').textContent = `Добавлено ${n} ${w} из голосового!`;
    document.getElementById('newBanner').classList.add('on');
    setTimeout(() => document.getElementById('newBanner').classList.remove('on'), 4000);
    if (tg) tg.HapticFeedback?.notificationOccurred('success');
  }

  // Проверяем URL параметры (бот передаёт задачи сюда)
  function checkUrlTasks() {
    const params = new URLSearchParams(window.location.search);
    const rawTasks = params.get('tasks');
    if (rawTasks) {
      try { addTasksFromBot(JSON.parse(decodeURIComponent(rawTasks))); } catch(e){}
      history.replaceState(null, '', window.location.pathname);
    }
  }

  // postMessage от бота
  window.addEventListener('message', e => {
    try {
      const d = typeof e.data==='string' ? JSON.parse(e.data) : e.data;
      if (d.type==='ADD_TASKS' && Array.isArray(d.tasks)) addTasksFromBot(d.tasks);
    } catch(err) {}
  });

  document.getElementById('inp').addEventListener('keydown', e => { if (e.key==='Enter') addManual(); });

  // Загрузка: сначала из Telegram CloudStorage
  Cloud.load(saved => {
    tasks = saved.length ? saved : [];
    renderTasks();
    checkUrlTasks();
  });
</script>
</body>
</html>
